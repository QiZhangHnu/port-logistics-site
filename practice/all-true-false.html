    <script>
(function initChapterFilter() {
    const questions = Array.from(document.querySelectorAll('.question'));
    if (!questions.length) return;

    function chapterNumber(chapterText) {
        const match = String(chapterText || '').match(/(\d+(?:\.\d+)?)/);
        return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
    }

    const chapterStats = {};
    questions.forEach(function (question) {
        const badge = question.querySelector('.badge');
        const chapter = badge ? badge.textContent.trim() : '';
        if (!chapter) return;
        if (!chapterStats[chapter]) chapterStats[chapter] = 0;
        chapterStats[chapter] += 1;
    });

    const chapters = Object.keys(chapterStats).sort(function (a, b) {
        return chapterNumber(a) - chapterNumber(b);
    });

    const params = new URLSearchParams(window.location.search);
    const targetChapter = (params.get('chapter') || '').trim();

    const intro = document.querySelector('.intro');
    const toolbar = document.createElement('div');
    toolbar.style.margin = '12px 0 18px';
    toolbar.style.padding = '12px';
    toolbar.style.border = '1px solid #dbeafe';
    toolbar.style.borderRadius = '10px';
    toolbar.style.background = '#f8fbff';

    const title = document.createElement('p');
    title.textContent = '章节筛选';
    title.style.margin = '0 0 8px';
    title.style.fontWeight = '600';
    title.style.color = '#1f4f82';
    toolbar.appendChild(title);

    const linksWrap = document.createElement('div');
    linksWrap.style.display = 'flex';
    linksWrap.style.flexWrap = 'wrap';
    linksWrap.style.gap = '8px';

    function buildLink(label, href, isActive) {
        const link = document.createElement('a');
        link.textContent = label;
        link.href = href;
        link.style.fontSize = '12px';
        link.style.textDecoration = 'none';
        link.style.padding = '4px 10px';
        link.style.borderRadius = '999px';
        link.style.border = isActive ? '1px solid #1f4f82' : '1px solid #93c5fd';
        link.style.color = isActive ? '#ffffff' : '#1f4f82';
        link.style.background = isActive ? '#1f4f82' : '#ffffff';
        return link;
    }

    const currentPath = window.location.pathname;
    const pageName = currentPath.slice(currentPath.lastIndexOf('/') + 1) || currentPath;

    linksWrap.appendChild(buildLink('全部章节', pageName, !targetChapter));
    chapters.forEach(function (chapter) {
        const href = pageName + '?chapter=' + encodeURIComponent(chapter);
        linksWrap.appendChild(buildLink(chapter + ' · ' + chapterStats[chapter] + '题', href, targetChapter === chapter));
    });
    toolbar.appendChild(linksWrap);

    const summary = document.createElement('p');
    summary.style.margin = '8px 0 0';
    summary.style.fontSize = '12px';
    summary.style.color = '#4b5563';
    toolbar.appendChild(summary);

    if (intro && intro.parentNode) {
        intro.insertAdjacentElement('afterend', toolbar);
    }

    let visibleCount = 0;
    questions.forEach(function (question) {
        const badge = question.querySelector('.badge');
        const chapter = badge ? badge.textContent.trim() : '';
        const keep = !targetChapter || chapter === targetChapter;
        question.style.display = keep ? '' : 'none';
        if (keep) visibleCount += 1;
    });

    summary.textContent = targetChapter
        ? ('当前显示 ' + targetChapter + '，共 ' + visibleCount + ' 题。')
        : ('当前显示全部章节，共 ' + visibleCount + ' 题。');
})();
</script>
